<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMF CLUB — Supabase Test</title>

<style>
body{
    background:#1A0808;
    color:#FFF7F4;
    font-family:Arial,sans-serif;
    padding:20px;
}
.card{
    background:#4A1515;
    border-radius:16px;
    padding:20px;
    max-width:600px;
    margin:auto;
}
h1{
    margin-top:0;
}
.title{
    background:rgba(255,255,255,.08);
    padding:12px;
    border-radius:10px;
    margin-top:10px;
}
.error{
    color:#ff8080;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="card">
    <h1>SMF CLUB</h1>

    <p>Проверка подключения к Supabase</p>

    <div id="status">Загрузка...</div>

    <div id="titles"></div>
</div>

<script>
const supabaseUrl = 'https://byvbwusgliotucnkxhqo.supabase.co'
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ5dmJ3dXNnbGlvdHVjbmt4aHFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyMzkwNDcsImV4cCI6MjA5NjgxNTA0N30.fQXXjtM_2tIdZA_M_CBO2SCzZI5N71u8--bklvwmQgY'

const supabase = window.supabase.createClient(
    supabaseUrl,
    supabaseKey
)

async function loadTitles() {

    const status = document.getElementById('status')
    const titlesBox = document.getElementById('titles')

    const { data, error } = await supabase
        .from('titles')
        .select('*')

    if(error){
        console.error(error)

        status.innerHTML = '<div class="error">Ошибка подключения. Открой F12 → Console</div>'

        return
    }

    status.innerHTML = 'Подключение успешно 🎉'

    data.forEach(title => {

        const div = document.createElement('div')

        div.className = 'title'

        div.innerHTML = `
            <strong>${title.name}</strong><br>
            ${title.type || ''}<br>
            ${title.description || ''}
        `

        titlesBox.appendChild(div)
    })
}

loadTitles()
</script>

</body>
</html>
