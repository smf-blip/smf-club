<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SMF ADMIN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#1a0808;color:#fff;margin:0;padding:20px}
.box{max-width:500px;margin:auto}
button{padding:10px;background:#8E2323;color:#fff;border:0;margin-top:10px;cursor:pointer}
input{width:100%;padding:8px;margin:5px 0}
.item{background:#2a0f0f;padding:10px;margin:10px 0;border-radius:8px}
</style>
</head>

<body>
<div class="box">

<h2>Admin Panel</h2>

<button onclick="openModal()">+ Добавить тайтл</button>

<div id="list"></div>

<!-- MODAL -->
<div id="modal" style="display:none;background:#000a;position:fixed;inset:0;padding:40px">
  <div style="background:#2a0f0f;padding:20px">
    <h3>Новый тайтл</h3>
    <input id="name" placeholder="Название">
    <input id="type" placeholder="Тип">
    <input id="genres" placeholder="Жанры">

    <button onclick="save()">Сохранить</button>
    <button onclick="closeModal()">Закрыть</button>
  </div>
</div>

</div>

<script>
// =========================
// SUPABASE INIT (FIXED)
// =========================
const supabase = window.supabase.createClient(
  "https://byvbwusgliotucnkxhqo.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ5dmJ3dXNnbGlvdHVjbmt4aHFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyMzkwNDcsImV4cCI6MjA5NjgxNTA0N30.fQXXjtM_2tIdZA_M_CBO2SCzZI5N71u8--bklvwmQgY"
);

// =========================
// LOAD DATA
// =========================
async function load(){
  const { data, error } = await supabase
    .from('titles')
    .select('*')
    .order('created_at', { ascending:false });

  if(error){
    console.log(error);
    return;
  }

  const list = document.getElementById('list');
  list.innerHTML = '';

  data.forEach(t=>{
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `
      <b>${t.name}</b><br>
      <small>${t.type || ''} ${t.genres || ''}</small><br>
      <button onclick="removeItem('${t.id}')">Удалить</button>
    `;
    list.appendChild(div);
  });
}

// =========================
// CREATE
// =========================
async function save(){
  const name = document.getElementById('name').value;
  const type = document.getElementById('type').value;
  const genres = document.getElementById('genres').value;

  const { error } = await supabase
    .from('titles')
    .insert([{ name, type, genres, status:'published' }]);

  if(error){
    console.log(error);
    alert('Ошибка сохранения');
    return;
  }

  closeModal();
  load();
}

// =========================
// DELETE
// =========================
async function removeItem(id){
  const { error } = await supabase
    .from('titles')
    .delete()
    .eq('id', id);

  if(error){
    console.log(error);
    alert('Ошибка удаления');
    return;
  }

  load();
}

// =========================
// MODAL
// =========================
function openModal(){
  document.getElementById('modal').style.display='block';
}
function closeModal(){
  document.getElementById('modal').style.display='none';
}

// =========================
// INIT
// =========================
load();

</script>

</body>
</html>
